<!-- index.html -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کافه امیر ☕</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Vazirmatn", sans-serif;
      }

      body {
        background: linear-gradient(to bottom right, #fff1eb, #ace0f9);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      header {
        width: 100%;
        background: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(10px);
        text-align: center;
        padding: 40px 20px;
        font-size: 2.8rem;
        font-weight: bold;
        color: #2c3e50;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      }

      header span {
        color: #ff6f61;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 30px;
        width: 90%;
        max-width: 1000px;
        margin-top: 50px;
      }

      .category {
        background: rgba(255, 255, 255, 0.7);
        border-radius: 20px;
        height: 180px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #2c3e50;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
      }

      .category::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom right, #ffecd2, #fcb69f);
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 0;
      }

      .category:hover::before {
        opacity: 1;
      }

      .category span {
        position: relative;
        z-index: 1;
      }

      .category:hover {
        transform: translateY(-8px) scale(1.03);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15);
      }

      footer {
        margin-top: auto;
        padding: 20px;
        color: #444;
        font-size: 0.9rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <header><span>کافه امیر</span> ☕</header>

    <main>
      <a href="cold-drinks.html" class="category"
        ><span>نوشیدنی سرد 🧊</span></a
      >
      <a href="hot-drinks.html" class="category"><span>نوشیدنی گرم ☕</span></a>
      <a href="ice-cream.html" class="category"><span>بستنی 🍦</span></a>
      <a href="fast-food.html" class="category"><span>فست فود 🍔</span></a>
      <a href="snacks.html" class="category"><span>تنقلات 🍪</span></a>
      <a href="desserts.html" class="category"><span>دسر 🍰</span></a>
    </main>

    <footer>طراحی شده با ❤️ توسط Amir Cafe</footer>
  </body>
</html>
